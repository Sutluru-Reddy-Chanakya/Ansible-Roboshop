- name: create ec2 and r53 records
  hosts: all
  connection: local

  vars:
    sg_id: "sg-0406ed13cc2ceaa28"
    ami_id: "ami-0220d79f3f480ecf5"
    env: "dev"
    instances:
      - mongodb
      - catalogue

  tasks:
  - name: create ec2 instance
  amazon.aws.ec2_instance:
    instance_type: "t3.micro"
    image_id: "{{ ami_id }}"
    security_group: 
      - "{{ sg_id }}"
    wait: true
    tags:
      project: "roboshop"
      env: "{{ env }}"
      component: "{{ item }}"
      Name: "{{ item }}-{{ env }}"
  loop: "{{ instances }}"
  register: ec2_output



