- name: create ec2 and r53 records
  hosts: all
  connection: local

  vars:
    sg_id: "sg-0406ed13cc2ceaa28"
    ami_id: "ami-0220d79f3f480ecf5"
    env: "dev"
    instances:
      - mongodb
      - catalogue

  tasks:
    - name: create ec2 instance
      amazon.aws.ec2:
        instance_type: "t3.micro"
        security_groups: "{{ sg_id }}"
        image: "{{ ami_id }}"
        wait: yes
        count: 1
        instance_tags:
          project: "roboshop"
          env: "{{ env }}"
          component: "{{ item }}"
          Name: "{{ item }}-{{ env }}"
      loop: "{{ instances }}"
      register: ec2_output

    - name: print ec2 output
      ansible.builtin.debug:
        msg: "{{ ec2_output }}"
