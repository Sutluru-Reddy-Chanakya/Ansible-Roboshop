- name: create ec2 and r53 records
  hosts: localhost
  connection: local

  vars:
    sg_id: sg-00bbb1407c348af3d
    ami_id: ami-0220d79f3f480ecf5
    env: "dev"
    action: "create"
    instances:
      - mongodb
      - catalogue

  tasks:

    ### CREATE ###
    - name: create ec2 instance
      amazon.aws.ec2_instance:
        instance_type: "t3.micro"
        security_group: "{{ sg_id }}" 
        # security_group_ids:
        #   - "{{ sg_id }}"
        image_id: "{{ ami_id }}"
        name: "{{ item }}-{{ env }}"
        tags:
          Project: "roboshop"
          Component: "{{ item }}"
          Environment: "{{ env }}"
          Name: "{{ item }}-{{ env }}"
      loop: "{{ instances }}"
      register: ec2_output
  

    - name: print ec2 output
      ansible.builtin.debug:
        msg: "{{ ec2_output }}"


    - name: create r53 records
      amazon.aws.route53:
      state: present
      zone: "{{ domain_name }}"
      record: "{{ item.item }}-{{ env }}.{{ domain_name }}" # mongodb-dev.cineniti.in, frontend-dev.cineniti.in
      type: A
      ttl: 1
      value: "{{ item.instances[0].private_ip_address }}"
      wait: true
      loop: "{{ ec2_output.results }}"
      
